# 1. API USER PRO GRAFANU (ZŮSTÁVÁ PŮVODNÍ)
- name: Create API user for Grafana integration
  community.zabbix.zabbix_user:
    username: "{{ zabbix_api_user }}"
    passwd: "{{ zabbix_api_user_password }}"
    role_name: "Super admin role"
    usrgrps:
      - "Zabbix administrators"
    state: present


- name: Create personal user with name, surname and school email
  community.zabbix.zabbix_user:
    username: "ondrej.jirotu"
    name: "ondrej"
    surname: "jirout"
    passwd: "heslo123"
    role_name: "Super admin role"
    usrgrps:
      - "Zabbix administrators"
    user_medias:
      - mediatype: "Email"
        sendto: "jirout.ondrej@student.sposdk.cz"
        active: true
    state: present
  register: personal_user